<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智能无影灯系统总览图 (防遮挡终极版)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #E9ECEF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: auto;
            overflow-y: auto;
        }
        /* 终极超宽版容器：3400px，彻底释放横向空间 */
        #main {
            width: 3400px;
            height: 1200px;
            margin: 40px auto;
            background-color: #FFFFFF;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-radius: 16px;
            position: relative;
        }
    </style>
    <!-- 使用国内极速稳定的 Staticfile CDN -->
    <script src="https://cdn.staticfile.net/echarts/5.5.0/echarts.min.js"></script>
</head>
<body>

<div id="main"></div>

<script>
    if (typeof echarts === 'undefined') {
        document.getElementById('main').innerHTML =
            '<h2 style="color:#E74C3C; text-align:center; padding-top:300px; font-family:sans-serif;">' +
            '🚨 ECharts 图表库加载失败！请检查网络或更换CDN。</h2>';
    } else {
        const chartDom = document.getElementById('main');
        const myChart = echarts.init(chartDom);

        const THEME = {
            'Perception': { bg: '#E1EFFF', border: '#6BAED6', title: '#0D47A1' },
            'Input':      { bg: '#F0F2F5', border: '#A1A1A1', title: '#424242' },
            'Decision':   { bg: '#E8D7F1', border: '#B39DDB', title: '#4A148C' },
            'Control':    { bg: '#FFE0B2', border: '#FFB74D', title: '#E65100' },
            'Hardware':   { bg: '#FFCDD2', border: '#E57373', title: '#B71C1C' },
            'Interface':  { bg: '#E8F5E9', border: '#81C784', title: '#1B5E20' }
        };

        function createNode(name, subtext, x, y, category) {
            const style = THEME[category];
            return {
                name: name,
                value: [x, y],
                symbol: 'roundRect',
                symbolSize: [210, 78],
                itemStyle: {
                    color: style.bg,
                    borderColor: style.border,
                    borderWidth: 2,
                    shadowColor: 'rgba(0, 0, 0, 0.1)',
                    shadowBlur: 8,
                    shadowOffsetY: 4,
                },
                label: {
                    show: true,
                    position: 'inside',
                    formatter: `{title|${name}}\n{sub|${subtext}}`,
                    rich: {
                        title: {
                            color: style.title,
                            fontSize: 15,
                            fontWeight: 'bold',
                            lineHeight: 24,
                            align: 'center'
                        },
                        sub: {
                            color: '#444',
                            fontSize: 13,
                            align: 'center',
                            lineHeight: 18
                        }
                    }
                }
            };
        }

        const option = {
            title: {
                text: '智能无影灯系统 (Smart Shadow Lamp) · 架构总览图',
                left: 'center',
                top: 40,
                textStyle: { fontSize: 32, color: '#17202A', fontWeight: 'bold', fontFamily: 'sans-serif' },
                subtext: 'Vision + Voice + Arm + Lighting Control Architecture',
                subtextStyle: { fontSize: 18, color: '#7F8C8D' }
            },
            tooltip: { show: false },
            animationDurationUpdate: 1000,

            // 扩展内部逻辑坐标系至 3400 x 1200
            xAxis: { type: 'value', min: 0, max: 3400, show: false },
            yAxis: { type: 'value', min: 0, max: 1200, inverse: true, show: false },

            series: [
                // 第一层：背景虚线大框
                {
                    type: 'scatter',
                    coordinateSystem: 'cartesian2d',
                    symbolSize: 0,
                    data: [[0,0]],
                    markArea: {
                        silent: true,
                        itemStyle: {
                            color: 'rgba(242, 248, 252, 0.4)',
                            borderWidth: 1.5,
                            borderColor: '#85C1E9',
                            borderType: 'dashed',
                            borderRadius: 16
                        },
                        label: {
                            position: 'insideTopLeft',
                            color: '#2874A6',
                            fontWeight: 'bold',
                            fontSize: 18,
                            padding: [24, 28]
                        },
                        // 区域划分（彻底适配加长版间距）
                        data: [
                            [ { name: '感知输入层 (Perception Input)', coord: [40, 120] },   { coord: [880, 1050] } ],
                            [ { name: '板端智能决策层 (RDK X5)', coord: [930, 120] }, { coord: [1450, 1050] } ],
                            [ { name: '执行控制层 (Execution Control)', coord: [1500, 120] }, { coord: [2450, 1050] } ],
                            [ { name: '物理作用层 (Physical Action)', coord: [2500, 120] }, { coord: [3360, 1050] } ]
                        ]
                    }
                },

                // 第二层：图谱节点与连线
                {
                    type: 'graph',
                    coordinateSystem: 'cartesian2d',
                    layout: 'none',
                    zlevel: 3,
                    edgeSymbol: ['none', 'arrow'],
                    edgeSymbolSize: [0, 14],

                    // 【核心修复区域】：利用 Rich Text 实现内部居中，同时保证框体死死锚定在线条正中心
                    edgeLabel: {
                        show: true,
                        position: 'middle', // 强制整个框体在连线中心
                        // 移除外层的 align 和 verticalAlign 避免框体偏移
                        formatter: function (params) {
                            // 将连线上的文字拆分，并套上 rich 样式 {a|文字}
                            let lines = params.value.split('\n');
                            return lines.map(line => '{a|' + line + '}').join('\n');
                        },
                        rich: {
                            a: {
                                align: 'center', // 仅让文字在白框内部居中
                                lineHeight: 18,
                                fontSize: 13,
                                fontWeight: 'bold',
                                color: '#1C2833'
                            }
                        },
                        backgroundColor: '#FFFFFF',
                        borderColor: '#BDC3C7',
                        borderWidth: 1,
                        padding: [8, 14], // 增加内边距让框看起来更舒展
                        borderRadius: 6,
                        shadowColor: 'rgba(0,0,0,0.08)',
                        shadowBlur: 4
                    },
                    lineStyle: {
                        color: '#7F8C8D',
                        width: 3,
                        curveness: 0
                    },

                    // 节点分布：列与列之间的间距达到惊人的 500px，线条超级长！
                    data: [
                        // Col 1: X=200
                        createNode('D435 相机', '桌面图像 / 手部 / 阴影', 200, 300, 'Perception'),
                        createNode('USB 麦克风', '语音采集 / 唤醒词', 200, 900, 'Input'),

                        // Col 2: X=700
                        createNode('视觉感知模块', 'vision_perception', 700, 300, 'Perception'),
                        createNode('语音控制模块', 'voice_control', 700, 900, 'Input'),
                        createNode('共享消息接口', 'shadow_lamp_interfaces', 700, 600, 'Interface'),

                        // Col 3: X=1200
                        createNode('系统协调模块', 'system_coordinator', 1200, 600, 'Decision'),

                        // Col 4: X=1700
                        createNode('机械臂控制模块', 'arm_control', 1700, 300, 'Control'),
                        createNode('灯控模块', 'light_control', 1700, 900, 'Control'),

                        // Col 5: X=2200
                        createNode('MoveIt Servo', '关节速度闭环', 2200, 300, 'Control'),

                        // Col 6: X=2700
                        createNode('OpenMANIPULATOR', '机械臂本体承载', 2700, 300, 'Hardware'),
                        createNode('WS2812B 灯光', '亮度 / 冷暖光 / 状态', 2700, 900, 'Hardware'),

                        // Col 7: X=3200
                        createNode('灯头 / 补光方向', '调整照射方向', 3200, 300, 'Hardware'),
                        createNode('桌面作业区域', '最终物理补光作用域', 3200, 600, 'Hardware')
                    ],

                    links: [
                        // 感知输入流
                        { source: 'D435 相机', target: '视觉感知模块', value: 'USB / V4L2\n彩色流输入', lineStyle: { curveness: 0 } },
                        { source: 'USB 麦克风', target: '语音控制模块', value: 'USB Audio\n离线语音采集', lineStyle: { curveness: 0 } },

                        // 汇总至决策中心 (微弧度)
                        { source: '视觉感知模块', target: '系统协调模块', value: '/vision/state', lineStyle: { curveness: 0.1 } },
                        { source: '语音控制模块', target: '系统协调模块', value: '/voice/command', lineStyle: { curveness: -0.1 } },
                        { source: '共享消息接口', target: '系统协调模块', value: '定义统一\n数据结构', lineStyle: { curveness: 0, type: 'dashed' } },

                        // 决策下发执行端 (微弧度)
                        { source: '系统协调模块', target: '机械臂控制模块', value: '/arm/command', lineStyle: { curveness: -0.1 } },
                        { source: '系统协调模块', target: '灯控模块', value: '/light/command\n(预留状态指令)', lineStyle: { curveness: 0.1, type: 'dashed', color: '#B39DDB' } },

                        // 机械臂控制流
                        { source: '机械臂控制模块', target: 'MoveIt Servo', value: 'JointJog\n底层速度指令', lineStyle: { curveness: 0 } },
                        { source: 'MoveIt Servo', target: 'OpenMANIPULATOR', value: '底层 UART\n硬件接口下发', lineStyle: { curveness: 0 } },
                        { source: 'OpenMANIPULATOR', target: '灯头 / 补光方向', value: '实体承载及\n空间位姿绑定', lineStyle: { curveness: 0 } },
                        { source: '灯头 / 补光方向', target: '桌面作业区域', value: '偏移修正\n阴影消除闭环', lineStyle: { curveness: 0 } },

                        // 灯光控制流 (长距离直线穿透)
                        { source: '灯控模块', target: 'WS2812B 灯光', value: 'SPI 直驱\n颜色状态映射', lineStyle: { curveness: 0 } },
                        { source: 'WS2812B 灯光', target: '桌面作业区域', value: '光照参数及\n系统模式反馈', lineStyle: { curveness: -0.15 } }
                    ]
                }
            ],

            // 底部图例面板
            graphic: [
                {
                    type: 'group',
                    left: 'center',
                    bottom: 40,
                    children: [
                        { type: 'rect', shape: { width: 1040, height: 50, r: 8 }, style: { fill: '#FFF', stroke: '#D5DBDB', lineWidth: 1, shadowColor: 'rgba(0,0,0,0.05)', shadowBlur: 5 } },

                        { type: 'circle', shape: { cx: 40, cy: 25, r: 7 }, style: { fill: THEME['Perception'].bg, stroke: THEME['Perception'].border, lineWidth: 2 } },
                        { type: 'text', style: { text: '视觉感知 (Perception)', x: 55, y: 19, fontSize: 14, fill: '#555', fontWeight: 'bold' } },

                        { type: 'circle', shape: { cx: 240, cy: 25, r: 7 }, style: { fill: THEME['Input'].bg, stroke: THEME['Input'].border, lineWidth: 2 } },
                        { type: 'text', style: { text: '语音交互 (Voice/Input)', x: 255, y: 19, fontSize: 14, fill: '#555', fontWeight: 'bold' } },

                        { type: 'circle', shape: { cx: 440, cy: 25, r: 7 }, style: { fill: THEME['Decision'].bg, stroke: THEME['Decision'].border, lineWidth: 2 } },
                        { type: 'text', style: { text: '决策协调 (Decision)', x: 455, y: 19, fontSize: 14, fill: '#555', fontWeight: 'bold' } },

                        { type: 'circle', shape: { cx: 620, cy: 25, r: 7 }, style: { fill: THEME['Control'].bg, stroke: THEME['Control'].border, lineWidth: 2 } },
                        { type: 'text', style: { text: '执行控制 (Control)', x: 635, y: 19, fontSize: 14, fill: '#555', fontWeight: 'bold' } },

                        { type: 'circle', shape: { cx: 795, cy: 25, r: 7 }, style: { fill: THEME['Hardware'].bg, stroke: THEME['Hardware'].border, lineWidth: 2 } },
                        { type: 'text', style: { text: '物理硬件 (Hardware)', x: 810, y: 19, fontSize: 14, fill: '#555', fontWeight: 'bold' } },

                        { type: 'line', shape: { x1: 975, y1: 25, x2: 1005, y2: 25 }, style: { stroke: '#B39DDB', lineWidth: 3, lineDash: [5, 5] } },
                        { type: 'text', style: { text: '预留增强链路', x: 1015, y: 19, fontSize: 14, fill: '#555', fontWeight: 'bold' } }
                    ]
                }
            ]
        };

        myChart.setOption(option);

        window.addEventListener('resize', function() {
            myChart.resize();
        });
    }
</script>

</body>
</html>
